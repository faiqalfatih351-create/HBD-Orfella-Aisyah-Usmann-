<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD Orfela Aisyah Usman! 💜✨</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body{
background:linear-gradient(-45deg,#a855f7,#ec4899,#6366f1,#d8b4fe);
background-size:400% 400%;
animation:gradientBG 15s ease infinite;
min-height:100vh;
font-family:'Quicksand',sans-serif;
display:flex;
align-items:center;
justify-content:center;
overflow-x:hidden;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.glass{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border:2px solid rgba(255,255,255,0.3);
border-radius:30px;
position:relative;
overflow:hidden;
}

.hidden{display:none;}

.card{
width:100%;
height:90px;
position:relative;
transform-style:preserve-3d;
transition:transform 0.6s;
cursor:pointer;
}

.card.flipped{transform:rotateY(180deg);}

.card-face{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:1.8rem;
backface-visibility:hidden;
}

.card-front{background:rgba(255,255,255,0.3);}
.card-back{background:white;transform:rotateY(180deg);}

.balloon{
position:absolute;
bottom:-100px;
animation:float 8s ease-in infinite;
opacity:0.6;
z-index:-1;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* LOVE BACKGROUND EFFECT */
.love{
position:absolute;
font-size:20px;
animation:floatLove 4s ease-out forwards;
pointer-events:none;
z-index:0;
opacity:0.7;
}

@keyframes floatLove{
0%{opacity:0.8; transform:translateY(20px) scale(0.8);}
100%{opacity:0; transform:translateY(-120px) scale(1.3);}
}

#typing-text{
position:relative;
z-index:2;
}
</style>
</head>

<body class="p-4">

<audio id="bgMusic" src="lagu/lagubuatpela.mp3" loop></audio>

<button id="muteBtn" onclick="toggleMute()" 
class="hidden fixed top-5 right-5 bg-white/40 text-white px-4 py-2 rounded-full backdrop-blur-md">
🔊
</button>

<!-- LOGIN -->

<h2 class="text-3xl font-bold text-white mb-4">alooooo ppeeelll 💜</h2>
<p class="text-white/90 mb-6 text-sm">masukinnn password yaaa, clueee yaa saatt kamuu lahirrr</p>
<input type="password" id="passInput" placeholder="hayoooo apaaaa"
class="bg-white/40 p-4 rounded-2xl mb-4 w-full text-center text-white placeholder-white/70">
<button onclick="checkPass()"
class="bg-white text-purple-600 font-extrabold py-3 px-8 rounded-full w-full">
bukaaa hadiahnyaaaa 🎁
</button>
</div>

<!-- GAME -->
<div id="section-game" class="hidden glass p-8 text-center w-full max-w-md">
<h2 class="text-2xl font-bold text-white mb-2">sebelumm lanjutt mainn duluu yukss! 🎮</h2>
<div id="game-board" class="grid grid-cols-3 gap-3 mb-4"></div>
<button id="btn-next-content" class="hidden mt-6 bg-pink-500 text-white font-bold py-3 px-8 rounded-full"
onclick="showContent()">mantaappp kamuuu bisaaa lanjuttt 👉</button>
</div>

<!-- CONTENT -->
<div id="section-content" class="hidden w-full max-w-4xl text-center pb-10 relative overflow-hidden">

<h1 class="text-4xl md:text-6xl font-bold text-white mb-6 animate__animated animate__heartBeat animate__infinite">
HBD ORFELAAAAAAAAA 🎉💜
</h1>

<div class="glass p-6 mb-8 text-left relative">
<p id="typing-text" class="text-white text-2xl leading-relaxed"></p>
</div>

<div id="photo-gallery" 
class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10 opacity-0 transition-opacity duration-1000">

<img src="gambar 1/gambar_1.jpeg" class="rounded-2xl border-4 border-white/50 aspect-square object-cover shadow-lg">
<img src="gambar 1/gamabar 3.jpeg" class="rounded-2xl border-4 border-white/50 aspect-square object-cover shadow-lg">
<img src="gambar 1/gambar 2.jpeg" class="rounded-2xl border-4 border-white/50 aspect-square object-cover shadow-lg">
<img src="gambar 1/gambar 4.jpeg" class="rounded-2xl border-4 border-white/50 aspect-square object-cover shadow-lg">
<img src="gambar 1/gambar 5.jpeg" class="rounded-2xl border-4 border-white/50 aspect-square object-cover shadow-lg">
<img src="gambar 1/gambar 6.jpeg" class="rounded-2xl border-4 border-white/50 aspect-square object-cover shadow-lg">

</div>

<button id="btn-to-spotify" class="hidden bg-indigo-600 text-white font-bold py-4 px-10 rounded-full"
onclick="showSpotify()">lanjuttttttt 👉</button>

</div>

<!-- SPOTIFY -->
<div id="section-spotify" class="hidden glass p-8 text-center w-full max-w-md">
<h2 class="text-2xl font-bold text-white mb-6">iniii plalyistt khususss buatt kamoeee 🎧💜</h2>

<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/playlist/097t9BSNEornqmPalGC1Cx?theme=0"
width="100%" height="352" frameBorder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

<br><br>

<button onclick="backToContent()" 
class="bg-white text-purple-600 font-bold py-2 px-6 rounded-full mr-2">
⬅ kembali
</button>

<button onclick="backToLogin()" 
class="bg-pink-500 text-white font-bold py-2 px-6 rounded-full">
kembali ke awal 💜
</button>

</div>

<script>

const doaText="Barakallah fii umrik Orfela Aisyah Usman... 💜 selamattt ulanggg tahunnn yaa ppeell, akuu selaluu mendoaakan yangg terbaikk untukkk kamuu😽i will alwayss supportt youuu in silencee, alwayss proudd of youuuuu. evenn if I'm no longer part of your lifee, i'll still be watchingg fromm afarr, wishingg forr yourrr happinesssss and successssss😽 semogaaa tahunn inii semuaaa yangg kamuu impikann semuaa terkabull aamiin ya rabbal alaminn, akuu mauuu ucapinn terimakaasiii untukk kamuu yangg selaluu adaa buatt akuu kaloo akuu mauu ceritaaa, akuu senangg di dekatt mu akuu hepii didekatt muu intinyaa kaloo withh u akuu hepiii😽 kamuuu kaloo mauu ceritaa kee akuu ceritaa ajaa jangann raguu raguu akuu gaa gigitt kokkk hehe walaupunnn nantiii kurangg bagusss responnyaaa tapii akuuu berusahaa kokk untukk memberikann responn yangg bagusss hehe maaap yaak kaloo akuu adaa salahh sama kamuu a yem sorii.... maapinn akuu yaa...... kadangg sedihh taukk liatt kamuu tingkahh ya bedaa... walaupunn bagii muu b ajaa tapii bagikuu bedaa bangedd... sekalii lagii kaloo akuu adaa salahh maaapinn yaakk😽😽 HEPIII BIRTDAYYY ORFELAAAAAAAAAAAAAAAAAAA🎉🎉🎉🎉🎉🎉";

const music=document.getElementById("bgMusic");

function checkPass(){
if(document.getElementById("passInput").value==="080311"){
document.getElementById("section-login").classList.add("hidden");
document.getElementById("section-game").classList.remove("hidden");
document.getElementById("muteBtn").classList.remove("hidden");
initGame();
music.play();
}else{alert("hayoooo apa kodenyaaa? 😜");}
}

function toggleMute(){
music.muted=!music.muted;
document.getElementById("muteBtn").innerText=music.muted?"🔇":"🔊";
}

let cardValues=['💜','💜','✨','✨','🎁','🎁','🎂','🎂','🦄','🦄','🌸','🌸'];
let flipped=[]; let matched=0;

function initGame(){
const board=document.getElementById("game-board");
board.innerHTML=""; matched=0;
cardValues.sort(()=>Math.random()-0.5);
cardValues.forEach(val=>{
let card=document.createElement("div");
card.className="card";
card.dataset.val=val;
card.innerHTML=`
<div class="card-face card-front"></div>
<div class="card-face card-back">${val}</div>`;
card.onclick=()=>flip(card);
board.appendChild(card);
});
}

function flip(card){
if(card.classList.contains("flipped")||flipped.length===2)return;
card.classList.add("flipped");
flipped.push(card);
if(flipped.length===2)setTimeout(checkMatch,700);
}

function checkMatch(){
if(flipped[0].dataset.val===flipped[1].dataset.val){
matched++;
if(matched===6){
document.getElementById("btn-next-content").classList.remove("hidden");
}
}else{
flipped[0].classList.remove("flipped");
flipped[1].classList.remove("flipped");
}
flipped=[];
}

let charIndex=0;

function spawnLove(){
let love=document.createElement("div");
love.className="love";
love.innerHTML="💜";
love.style.left=Math.random()*100+"%";
love.style.top=(Math.random()*40+40)+"%";
document.querySelector("#section-content .glass").appendChild(love);
setTimeout(()=>love.remove(),4000);
}

function showContent(){
document.getElementById("section-game").classList.add("hidden");
document.getElementById("section-content").classList.remove("hidden");
typeWriter();
}

function typeWriter(){
if(charIndex<doaText.length){
document.getElementById("typing-text").innerHTML+=doaText.charAt(charIndex);
spawnLove();
charIndex++;
setTimeout(typeWriter,40);
}else{
document.getElementById("btn-to-spotify").classList.remove("hidden");
document.getElementById("photo-gallery").classList.remove("opacity-0");
}
}

function showSpotify(){
document.getElementById("section-content").classList.add("hidden");
document.getElementById("section-spotify").classList.remove("hidden");
music.pause();
}

function backToContent(){
document.getElementById("section-spotify").classList.add("hidden");
document.getElementById("section-content").classList.remove("hidden");
music.play();
}

function backToLogin(){
location.reload();
}

</script>
</body>
</html>
